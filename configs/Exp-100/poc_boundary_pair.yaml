# ═══════════════════════════════════════════════════════════════════════════
# EXP-100 PoC — Boundary-Pair Pipeline (Evolutionary → PDQ)
# ═══════════════════════════════════════════════════════════════════════════
#
# Derived from `poc_workstation_cone.yaml`. Same 6-class roster + cone
# image backend + LLaVA-OV-INT8 SUT.  Difference: evolutionary stage is
# followed by PDQ Stage 1 + anchor-aware Stage 2 per seed.  Output is
# paired (genotype_anchor, genotype_min) rows in archive.parquet tagged
# by pareto_idx — BVA boundary characterisation.
#
# Profile:       Tight (3 anchors × ~111 PDQ calls = 333 PDQ calls / seed)
#   * k = 3 Pareto anchors (top by TgtBal)
#   * Stage 1 budget = 20 calls / anchor
#   * Stage 2 budget = 30 calls / flip, zero-pass only
#   * max_flips_per_seed = 3
#
# Cost (rough, 720 seeds, workstation OV-GPU, N=6 categories ⇒ ~1.5-3s/call):
#   * Evo stage: identical to poc_workstation_cone (~36h MPS / ~20h workstation
#     w/ 2 workers and early-stop)
#   * PDQ stage: 720 × 333 ≈ 240K SUT calls → ~10-20h additional
#   * Total Tight forecast: ~30-40h on workstation
#
# Output: runs/Exp-100/poc_boundary_pair/seed_<i>_<ts>/{evolutionary/,pdq/,manifest.json}
# Run:
#   python experiments/runners/run_boundary_pair_test.py \
#       configs/Exp-100/poc_boundary_pair.yaml
# ═══════════════════════════════════════════════════════════════════════════

name: poc_boundary_pair
save_dir: runs/Exp-100

device: cpu

# Explicit 6-class label set. PDQ scores against this 6-cat tuple — keeps
# argmax-flip detection meaningful (5 possible flip targets per anchor)
# and fast (6-class scoring is ~8× cheaper than full-N at inference).
# Evolutionary stage still does pair-only SUT scoring (default
# score_full_categories=false), so this list does not pollute Exp-100's
# pair-only fitness semantics.
categories:
  - junco
  - ostrich
  - green iguana
  - boa constrictor
  - cello
  - marimba


# ───────────────────────────────────────────────────────────────────────────
# SUT — LLaVA-OV-INT8 on workstation Arc A770
# ───────────────────────────────────────────────────────────────────────────

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU


cache_dirs:
  - /mnt/storage/huggingface/imagenet


# ───────────────────────────────────────────────────────────────────────────
# Reproducibility (PDQ-side RNG; evolutionary uses its own pymoo path)
# ───────────────────────────────────────────────────────────────────────────

reproducibility:
  seed_int: 42
  dump_rng_state: true
  dump_git_hash: true
  dump_env: true


# ───────────────────────────────────────────────────────────────────────────
# Roster — 6 classes × 3 seeds (720 SeedTriples after combinatorial expansion)
# ───────────────────────────────────────────────────────────────────────────
# Class list identical to poc_workstation_cone (junco/ostrich/iguana/boa/
# cello/marimba — LLaVA-INT8-compatible swaps applied to original PoC).
# Thresholds also carried over; recalibrate via preflight if any class
# fails roster acceptance.

seeds:
  mode: roster
  roster:
    class_list:
      - junco
      - ostrich
      - green iguana
      - boa constrictor
      - cello
      - marimba
    seeds_per_class: 3
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [0, 1, 2]
      levels_target: [0, 1, 2]
      apply_disjointness: true
      directions: both


# ───────────────────────────────────────────────────────────────────────────
# Image manipulator — VQGAN cone backend (Exp-26 default)
# ───────────────────────────────────────────────────────────────────────────

image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz
  cone_filter:
    enabled: true
    alpha_deg: 20.0
    target_m: 10


text:
  composite:
    profile: full_stack


parallel:
  workers: 2                              # OV-GPU + torch/CPU split → true concurrency


# ═══════════════════════════════════════════════════════════════════════════
# Stage 1 — Evolutionary (AGE-MOEA-II)
# ═══════════════════════════════════════════════════════════════════════════
# Settings identical to poc_workstation_cone — comparable Pareto-front
# extraction across both PoC variants.

evolutionary:
  generations: 200
  pop_size: 30
  modality: joint
  score_full_categories: false
  optimizer:
    sampling:
      mode: sparse_multitier
      zero_anchor_fraction: 0.05
      tiers:
        - {p_active: 0.005, fraction: 0.20}   # spike       E[n_active] ≈ 1
        - {p_active: 0.030, fraction: 0.20}   # sparse      E[n_active] ≈ 7
        - {p_active: 0.100, fraction: 0.25}   # medium      E[n_active] ≈ 22
        - {p_active: 0.300, fraction: 0.20}   # heavy       E[n_active] ≈ 67
        - {p_active: 0.500, fraction: 0.10}   # very heavy  E[n_active] ≈ 111
    early_stop:
      enable: true
      epsilon_margin: 1.0e-30
      plateau_patience: 50
      no_improvement_warmup: 30
      hypervolume_reference: null


# ═══════════════════════════════════════════════════════════════════════════
# Anchor selection — Tight: top-3 Pareto members by TgtBal
# ═══════════════════════════════════════════════════════════════════════════

anchor_selection:
  source: pareto_front
  k: 3
  label_assignment: argmax_pair_softmax


# ═══════════════════════════════════════════════════════════════════════════
# Stage 2 — PDQ (Tight profile, anchor-aware)
# ═══════════════════════════════════════════════════════════════════════════
# Budget tuned for first full PoC pass — validates pipeline output quality
# before scaling B1/B2. Stage-2 shrink at B2=30 is modest (~5-15% delta
# reduction); revisit after first pass shows whether tighter pairs are
# scientifically informative.

pdq:
  stage1:
    budget_sut_calls: 20
    max_flips_per_seed: 3
    max_distinct_targets: 3
    flip_policy: any_non_anchor
    strategies:
      - {name: dense_uniform, weight: 0.25}
      - {name: bituniform_density, weight: 0.15}
      - {name: modality_text, weight: 0.20, density: 1.0}
      - {name: sparsity_sweep, weight: 0.15, densities: [0.2, 0.5, 1.0]}
      - {name: max_rank, weight: 0.15, subset_fractions: [0.1, 0.5, 1.0]}
      - {name: modality_image, weight: 0.10, density: 0.6}
    early_stop:
      on_targets_complete: true
      on_flips_complete: true
      min_calls_before_stop: 10

  stage2:
    budget_sut_calls_per_flip: 30
    flip_preserve_policy: any_non_anchor
    passes:
      zero:
        enabled: true
        order: by_gene_value_desc
        full_sweep_only: true
      rank:
        enabled: false
      random_subset:
        enabled: false

  distances:
    d_i_primary: rank_sum_delta             # anchor-aware: Σ|g − anchor|
    d_i_compute_all: true
    d_o_primary: label_mismatch
    d_o_compute_all: true

  logging:
    save_anchor_images: true
    save_flip_images: true
    save_all_candidate_images: false        # 720 × 333 calls = huge storage
    parquet_compression: zstd
    flush_interval_calls: 50
