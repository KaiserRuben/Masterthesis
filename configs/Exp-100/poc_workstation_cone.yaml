# ═══════════════════════════════════════════════════════════════════════════
# EXP-100 PoC v2 (Workstation) — Combinatorial Class Geometry on LLaVA-OV +
#                                  VQGAN-Cone as new default image backend
# ═══════════════════════════════════════════════════════════════════════════
#
# Adapted from `configs/Exp-100/poc_6x_2-2-2_n3.yaml` (original PoC, Qwen-MPS,
# VQGAN-KNN baseline). Deltas:
#
#   1. SUT switched Qwen3.5-4B/MPS  →  LLaVA-v1.6-INT8/OpenVINO/GPU
#      Rationale: workstation Arc A770 throughput; LLaVA documented validated
#      for ~10h cone-VQGAN runs in Exp-26.
#
#   2. Image backend KNN-baseline (cone disabled)  →  VQGAN cone-filter ON
#      Rationale: Exp-26 boundary-geometry analysis showed cone halves
#      image-cost-to-boundary (MD median 0.016 vs baseline 0.032 on seed_1)
#      and inflates Pareto-width 10× — making cone the better DEFAULT search
#      geometry for class-geometry experiments where multiple boundary
#      attack-surfaces per pair are desirable, even though TgtBal-floor is
#      unchanged. Single tuning knob: α=20° (Exp-26 default, sweep deferred
#      to MPS Exp-27).
#
#   3. Cache paths swapped to workstation storage layout.
#
# Roster unchanged (junco / macaw / green iguana / boa constrictor /
# cello / drum), same 720-run combinatorial structure (3 within-bucket
# pairs × 24 + 12 across-bucket pairs × 54).
#
# Scoring stays pair-only (`score_full_categories: false`, default).
# Rationale per Exp-100 spec §Scoring-Modus: full-N would systematically
# bias label-space toward higher abstraction (p(bird) > p(Junco) for any
# bird image), invalidating NCA-style claims. Pair-only is the experiment's
# correct scope.
#
# Anchor-confidence threshold (`min_anchor_confidence: 3.5`) carried over
# from Qwen-PoC. LLaVA-v1.6 anchor behavior likely different; if preflight
# fails to find 3 seeds/class, RosterSeedGenerator fails-fast and the
# threshold needs LLaVA-specific recalibration (a separate preflight run
# is the proper way to set this).
#
# Budget: 200 generations × 30 pop = 6000 evals/run (early-stop typically
# halves this). At ~3 min/run cone-VQGAN/LLaVA-OV → ~36h for 720 runs.
#
# Hypotheses unchanged from Exp-100 spec (H1–H5).
#
# Output: runs/Exp-100/exp100_poc_workstation_cone_<class_pair>_<ts>/
# Design ref: [[Exp-100-Class-Geometry]] + [[Exp-26-Image-Backend-Cone-vs-StyleGAN]]
# ═══════════════════════════════════════════════════════════════════════════

name: exp100_poc_workstation_cone
save_dir: runs/Exp-100

# Optimizer budget — matches original PoC; cone runs slightly slower than
# baseline KNN due to candidate-restriction overhead but stays comparable.
generations: 200
pop_size: 30

device: cpu

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

# n_categories left unset — categories resolve to the roster's L0 class set
# for honest anchor scoring. SMOO runs are pair-only.

seeds:
  mode: roster
  roster:
    class_list:
      - junco
      - ostrich              # swapped from 'macaw' after preflight: LLaVA-OV-INT8
                             # mis-classifies macaw as 'boa constrictor' in 11/12
                             # cases (gt_logprob ~ [-4.1, -3.2] on misclass).
                             # Likely INT8-quantization artifact + visual feature
                             # overlap (long tail / pose). ostrich (L1=ratite) has
                             # distinct silhouette far from boa visually; preserves
                             # within-bucket c=2 with junco (L1=songbird).
                             # Note: original PoC had bald eagle → macaw swap for
                             # the analogous Qwen-4B blind spot (eagle → iguana,
                             # 10/12). Two SUTs, two different blind spots, same
                             # structural fix.
      - green iguana
      - boa constrictor
      - cello
      - marimba              # swapped from 'drum' after preflight: LLaVA-OV-INT8
                             # misclassifies all 12/12 drum images as 'boa
                             # constrictor' within the 6-class roster contrast
                             # (gt_logprob median -7.03). Note: 'snare drum'
                             # initially attempted but not in src/data taxonomy.
                             # probe_class.py over {marimba, steel drum, gong,
                             # maraca, chime} on n=20 each: marimba 14/20 SAFE,
                             # gong 5/20 BORDERLINE, others 0/20 WILL FAIL. All
                             # losers leak to 'boa constrictor' (the LLaVA-INT8
                             # generic attractor) plus 'marimba' as secondary
                             # within-percussion attractor. Preserves L1=percussion
                             # within L2=musical instrument bucket.
    seeds_per_class: 3
    # Threshold carried over from Qwen PoC. May need LLaVA-specific
    # recalibration — fail-fast surfaces unfilled classes; if so, run a
    # short preflight to characterize LLaVA gt_logprob distribution per
    # class and reset accordingly.
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [0, 1, 2]
      levels_target: [0, 1, 2]
      apply_disjointness: true
      directions: both

# Image manipulator — VQGAN cone (new default per Exp-26 analysis).
image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz
  cone_filter:
    enabled: true               # ← cone-default
    alpha_deg: 20.0             # Exp-26 default; alpha-sweep on Exp-27 MPS
    target_m: 10

# Parallel seed execution — Workstation has OV/GPU + torch/CPU split,
# distlock keys differ ("GPU" vs "cpu") → threads truly concurrent.
# 2 workers is the documented sweet spot (`src/config.py:ParallelConfig`).
# Expected speedup: ~1.8× (overlap of GPU-SUT-call with CPU cone-target
# / VQGAN-decode), reducing 720-run wall-time from ~36h to ~20h.
parallel:
  workers: 2

# Optimizer — multi-tier sparse (Exp-22 Phase 1+2 validated default).
optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}   # spike       E[n_active] ≈ 1
      - {p_active: 0.030, fraction: 0.20}   # sparse      E[n_active] ≈ 7
      - {p_active: 0.100, fraction: 0.25}   # medium      E[n_active] ≈ 22
      - {p_active: 0.300, fraction: 0.20}   # heavy       E[n_active] ≈ 67
      - {p_active: 0.500, fraction: 0.10}   # very heavy  E[n_active] ≈ 111
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
