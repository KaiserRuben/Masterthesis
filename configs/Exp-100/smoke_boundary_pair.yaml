# ═══════════════════════════════════════════════════════════════════════════
# Boundary-pair pipeline smoke test — Exp-100 dry run
# ═══════════════════════════════════════════════════════════════════════════
#
# Purpose:       Verify boundary-pair (evolutionary → PDQ) pipeline data flow
#                + output completeness end-to-end on real components
#                (Qwen3.5-4B / MPS). NOT a research run — budgets are minimal,
#                no scientific claim.
#
# Tests:
#   * Evolutionary stage runs, writes evolutionary/ subdir artifacts
#   * Pareto extraction works, manipulator handoff in-memory
#   * Per-anchor SUT call → pair-softmax label assignment
#   * PDQ core runs Stage 1 + Stage 2 with non-zero anchor genome
#   * archive.parquet rows tagged anchor_source="evolutionary", pareto_idx populated
#   * d_i_primary computed via rank_sum_delta (anchor-aware)
#   * manifest.json aggregates anchor summaries
#
# Run:
#   python experiments/runners/run_boundary_pair_test.py \
#       configs/Exp-100/smoke_boundary_pair.yaml
#
#   python experiments/runners/verify_combined_outputs.py \
#       runs/Exp-100/smoke_boundary_pair/seed_0000_<ts>
#
# Expected runtime: ~4–8 min on M-series MPS with Qwen3.5-4B.
# Expected outputs:
#   runs/Exp-100/smoke_boundary_pair/seed_0000_<ts>/{evolutionary/,pdq/,manifest.json}
# ═══════════════════════════════════════════════════════════════════════════

name: smoke_boundary_pair
save_dir: runs/Exp-100

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B           # 4B model — same as Exp-100 PoC, fastest on MPS

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet


# ───────────────────────────────────────────────────────────────────────────
# Seed pool — one seed, proven-hard pair.
# ───────────────────────────────────────────────────────────────────────────
# Roster with class_list=[junco, chickadee] + seeds_per_class=1 yields one
# seed pair (forward direction, L0/L0). Known difficult pair from Exp-22 /
# Exp-25; gives non-trivial flip behaviour at small Stage-1 budgets.
# n_categories=50 widens the argmax space so random Stage-1 candidates can
# resolve to many classes — without it, the model's strong class anchoring
# yields all-same-label candidates (smoke run 17:45 had 30/30 = tench).

n_categories: 50
seeds:
  mode: roster
  filter_indices: [0]
  roster:
    # hammerhead shark ↔ spotted salamander — canonical Exp-25 pair.
    # Visually very distinct so Qwen3.5-4B classifies each correctly;
    # near-boundary VQGAN perturbations are non-trivial → flip activity
    # expected at small Stage-1 budgets.
    class_list:
      - hammerhead shark
      - spotted salamander
    seeds_per_class: 1
    min_anchor_confidence: 4.5            # spotted salamander gt_logprob ≈ -4.2 → needs ≤ 4.5
    abstraction:
      levels_anchor: [0]
      levels_target: [0]
      apply_disjointness: true
      directions: forward


reproducibility:
  seed_int: 42


# ───────────────────────────────────────────────────────────────────────────
# Image / text manipulators — defaults (VQGAN codebook)
# ───────────────────────────────────────────────────────────────────────────

image:
  backend: vqgan_codebook
  preset: f8-16384
  patch_ratio: 0.1
  n_candidates: 25
  candidate_strategy: KNN

text:
  composite:
    profile: full_stack


# ═══════════════════════════════════════════════════════════════════════════
# Stage 1 — Evolutionary (tiny)
# ═══════════════════════════════════════════════════════════════════════════
# 5 gen × 12 pop → ~60 SUT calls. Enough to produce a non-trivial Pareto
# front in the joint 3-objective setting without long runtime.

evolutionary:
  generations: 5
  pop_size: 12
  modality: joint
  optimizer:
    sampling:
      mode: sparse_multitier
      zero_anchor_fraction: 0.05
      tiers:
        - {p_active: 0.005, fraction: 0.20}
        - {p_active: 0.030, fraction: 0.20}
        - {p_active: 0.100, fraction: 0.25}
        - {p_active: 0.300, fraction: 0.20}
        - {p_active: 0.500, fraction: 0.10}
    early_stop:
      enable: false                     # 5 gens — no point


# ═══════════════════════════════════════════════════════════════════════════
# Anchor selection — pick top 2 Pareto by TgtBal
# ═══════════════════════════════════════════════════════════════════════════
# k=2 exercises the per-anchor loop without ballooning runtime. null = all.

anchor_selection:
  source: pareto_front
  k: 2
  label_assignment: argmax_pair_softmax


# ═══════════════════════════════════════════════════════════════════════════
# Stage 2 — PDQ (per anchor, tiny budget)
# ═══════════════════════════════════════════════════════════════════════════
# ~15 Stage-1 calls × 2 anchors + ~20 Stage-2 calls × <=4 flips × 2 anchors
# ≈ 30 + 160 = ~190 SUT calls. On Qwen3.5-4B / MPS ~1-2s each → 3-6 min.

pdq:
  stage1:
    budget_sut_calls: 25                # 6 strategies → ~4 calls each
    max_flips_per_seed: 4
    max_distinct_targets: 3
    flip_policy: any_non_anchor
    strategies:
      - {name: dense_uniform, weight: 0.25}
      - {name: bituniform_density, weight: 0.15}
      - {name: modality_text, weight: 0.20, density: 1.0}
      - {name: sparsity_sweep, weight: 0.15, densities: [0.2, 0.5, 1.0]}
      - {name: max_rank, weight: 0.15, subset_fractions: [0.1, 0.5, 1.0]}
      - {name: modality_image, weight: 0.10, density: 0.6}
    early_stop:
      on_targets_complete: true
      on_flips_complete: true
      min_calls_before_stop: 5

  stage2:
    budget_sut_calls_per_flip: 20
    flip_preserve_policy: any_non_anchor
    passes:
      zero:
        enabled: true
        order: by_gene_value_desc
        full_sweep_only: true
      rank:
        enabled: false
      random_subset:
        enabled: false

  distances:
    d_i_primary: rank_sum_delta         # anchor-aware: |g − anchor|
    d_i_compute_all: true
    d_o_primary: label_mismatch
    d_o_compute_all: true

  logging:
    save_anchor_images: true
    save_flip_images: true
    parquet_compression: zstd
    flush_interval_calls: 25
