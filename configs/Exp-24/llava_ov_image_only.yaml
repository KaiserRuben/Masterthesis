# ═══════════════════════════════════════════════════════════════════════════
# EXP-24 — Modality-Impact Cross-SUT (LLaVA-NeXT INT8 OpenVINO, image-only)
# ═══════════════════════════════════════════════════════════════════════════
#
# Mirror of llava_ov_joint.yaml — `modality: image_only` forces text
# composite to `noop` (text_dim=0) and drops TextEmbeddingDistance from
# the Pareto. 2-objective: MatrixDistance + TargetedBalance.
#
# Output: runs/Exp-24/exp24_llava_ov_image_only_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp24_llava_ov_image_only
save_dir: runs/Exp-24

modality: image_only

generations: 300
pop_size: 30

device: cpu

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [83]
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz

# text section omitted — modality=image_only forces profile=noop at runtime.

optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}
      - {p_active: 0.030, fraction: 0.20}
      - {p_active: 0.100, fraction: 0.25}
      - {p_active: 0.300, fraction: 0.20}
      - {p_active: 0.500, fraction: 0.10}
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
