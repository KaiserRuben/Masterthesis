# ═══════════════════════════════════════════════════════════════════════════
# EXP-24 — Modality-Impact Cross-SUT (LLaVA-NeXT INT8 OpenVINO, joint)
# ═══════════════════════════════════════════════════════════════════════════
#
# Mirrors qwen_mps_joint.yaml on the workstation Arc A770: SUT swapped to
# LLaVA-NeXT-Mistral-7B INT8 OpenVINO. Same gap_filter [83], generations,
# pop, multitier init, full_stack composite. Modality = joint.
#
# Note: TextEmbeddingDistance falls back to sentence-transformers MiniLM
# under the OV backend (no hidden-state output IRs); internally consistent
# within this run, not directly cross-comparable to MPS in that one
# dimension. MatrixDistance + TargetedBalance unchanged.
#
# Output: runs/Exp-24/exp24_llava_ov_joint_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp24_llava_ov_joint
save_dir: runs/Exp-24

modality: joint

generations: 300
pop_size: 30

device: cpu                              # ignored by OV backend

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [83]
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz

text:
  composite:
    profile: full_stack
    overrides:
      synonym: {device: cpu}             # default mps; override for Linux/Arc

optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}
      - {p_active: 0.030, fraction: 0.20}
      - {p_active: 0.100, fraction: 0.25}
      - {p_active: 0.300, fraction: 0.20}
      - {p_active: 0.500, fraction: 0.10}
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
