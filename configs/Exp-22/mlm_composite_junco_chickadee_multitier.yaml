# ═══════════════════════════════════════════════════════════════════════════
# EXP-22b — MLM Composite, Multi-Tier Image Init (junco↔chickadee, seed 83)
# ═══════════════════════════════════════════════════════════════════════════
#
# Phase-1 follow-up to Exp-22. Identical pair / seed / pipeline / objectives /
# generations / pop / text-profile. ONLY change: replace single-p_active
# sparse init with explicit multi-tier coverage of the image-activation
# regime.
#
# Motivation (from Exp-22 search-space-coverage audit):
#   - max image n_active ever: 25 / 222 = 11.3 %
#   - 0 % of population ever above 30 / 222
#   - heavy-image best TgtBal (img>20): 2.487, competitive with run-best 2.431
#     but only 71 / 9000 individuals ever sampled there
#   - corr(img_n_active, TgtBal) = -0.43 (stronger signal than TextDist)
#   - sparse-init p_active=0.03 + Pareto-MtxDist-min sortation → optimizer
#     stuck in init regime; can't escape via local mutation
#
# Hypothesis H22b-1: with spike + medium + heavy individuals coexisting from
# gen 0, AGE-MOEA-II's selection alone (no algorithm change) suffices to
# discover whether heavy-regime offers a deeper TgtBal floor.
#
# Tier breakdown (image_dim = 222):
#   spike       p=0.005  E[n_active] ≈ 1.1
#   sparse      p=0.030  E[n_active] ≈ 6.7    ← the Exp-22 default regime
#   medium      p=0.100  E[n_active] ≈ 22     ← upper edge of Exp-22 max
#   heavy       p=0.300  E[n_active] ≈ 67     ← never visited in Exp-22
#   very heavy  p=0.500  E[n_active] ≈ 111    ← never visited in Exp-22
#
# Falsification policy:
#   - if min TgtBal < 2.43 → multi-tier init helps; sparse-init was the
#     bottleneck; current optimizer + objectives are sufficient given
#     decent init.
#   - if min TgtBal ≈ 2.43 and final pop's heavy-tier individuals were
#     killed by selection within first ~30 gens → optimizer cannot
#     persist heavy-regime under (MtxDist↓, TextDist↓, TgtBal↓) Pareto;
#     escalate to Phase-2 (pre-optimizer importance-score work).
#   - if min TgtBal > 2.43 → multi-tier hurt by spreading population too
#     thin; need narrower tier set or larger pop_size.
#
# Output: runs/Exp-22/exp22b_multitier_junco_chickadee_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp22b_multitier_junco_chickadee
save_dir: runs/Exp-22

generations: 300
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [83]
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

text:
  composite:
    profile: full_stack

optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}   # spike
      - {p_active: 0.030, fraction: 0.20}   # sparse — Exp-22 default
      - {p_active: 0.100, fraction: 0.25}   # medium
      - {p_active: 0.300, fraction: 0.20}   # heavy
      - {p_active: 0.500, fraction: 0.10}   # very heavy
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
