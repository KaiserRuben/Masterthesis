# EXP-22d вЂ” Tier Sweep Calibration  (A0: current-default baseline, P1: juncoв†”chickadee)
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
#
# Canonical reference config for the tier-sweep calibration. Identical to the
# current sparse_multitier default introduced in Exp-22b, run on the Exp-22
# canonical hard pair via roster-mode (n=3 seeds, single direction).
#
# Cell ID: tier=A0 (default 20/20/25/20/10 alloc, p в€€ {0.005, 0.030, 0.10,
#          0.30, 0.50}, zero-anchor 5 %)  Г—  pair=P1 (juncoв†”chickadee, c=1)
#
# This file is the manually-written reference. The other 20 cell-configs
# (tier в€€ {A0,A1,A2,A3,B1,B2,B3} Г— pair в€€ {P1,P2,P3}, minus this one) are
# produced by `python configs/Exp-22d/generate.py`. Source-of-truth for tier
# definitions lives in that script, not here вЂ” edit there if tiers change.
#
# Status: PENDING вЂ” do not launch until Exp-100-PoC has read out.
# Spec: Obsidian [[Exp-22d-Tier-Calibration]]
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

name: exp22d_A0_junco_chickadee
save_dir: runs/Exp-22d

# Calibration fidelity matches Exp-100-PoC, not Exp-22 (300Г—30). Tier-effect
# differentiation was already saturated by ~gen 50 in Exp-22b traces, so 200
# is sufficient and ~33 % cheaper. Early-stop will cut most runs much
# shorter.
generations: 200
pop_size: 30

device: mps                     # SUT: post-Exp-23 selection. Placeholder
                                # below until Exp-23 H23-1/H23-2 are read.
sut:
  model_id: Qwen/Qwen3.5-4B     # TODO post-Exp-23: swap to chosen real-VLM

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

# ---------------------------------------------------------------------------
# Pair P1 вЂ” juncoв†”chickadee. Roster mode for consistency with Exp-100;
# directions=forward to keep run count at 3 per cell (1 directed pair Г— 3
# seeds), not 6.
# ---------------------------------------------------------------------------
seeds:
  mode: roster
  roster:
    class_list:
      - junco
      - chickadee
    seeds_per_class: 3
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [0]
      levels_target: [0]
      apply_disjointness: true
      directions: forward

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

text:
  composite:
    profile: full_stack

# ---------------------------------------------------------------------------
# Tier A0 вЂ” current sparse_multitier default. Allocations 20/20/25/20/10,
# p-grid {0.005, 0.030, 0.10, 0.30, 0.50}, zero-anchor 5 %. This is the
# shared baseline for both Sweep A (allocation variants) and Sweep B
# (p-grid variants); B0 в‰Ў A0.
# ---------------------------------------------------------------------------
optimizer:
  method: M0
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}   # spike       E[n_active] в‰€ 1
      - {p_active: 0.030, fraction: 0.20}   # sparse      E[n_active] в‰€ 7
      - {p_active: 0.100, fraction: 0.25}   # medium      E[n_active] в‰€ 22
      - {p_active: 0.300, fraction: 0.20}   # heavy       E[n_active] в‰€ 67
      - {p_active: 0.500, fraction: 0.10}   # very heavy  E[n_active] в‰€ 111
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
