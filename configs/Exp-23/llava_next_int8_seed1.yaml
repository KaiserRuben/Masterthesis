# ═══════════════════════════════════════════════════════════════════════════
# EXP-23 — VLM-SUT Comparison II (LLaVA-NeXT-Mistral-7B int8 OpenVINO, seed 1)
# ═══════════════════════════════════════════════════════════════════════════
#
# Companion to qwen25vl_int4_seed1.yaml. Same setup, different SUT family
# -- LLaVA-NeXT (Mistral backbone) on Arc A770 via OpenVINO. Together they
# probe whether the boundary tester's TgtBal floor is SUT-agnostic or
# family-sensitive on the same seed.
#
# Output: runs/Exp-23/exp23_llava_next_int8_seed1_seed_1_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp23_llava_next_int8_seed1
save_dir: runs/Exp-23

generations: 400
pop_size: 50

device: cpu

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU
  # redis_url uses the default redis://localhost:6379 (podman container)

cache_dirs:
  - /mnt/storage/huggingface/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [1]
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz

text:
  composite:
    profile: full_stack
    overrides:
      synonym: {device: cpu}                # full_stack profile defaults to mps; override for Linux/Arc

optimizer:
  sampling:
    mode: sparse
    p_active: 0.03
    geometric_rate: 0.5
    zero_anchor_fraction: 0.05
    uniform_fallback_fraction: 0.10
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
