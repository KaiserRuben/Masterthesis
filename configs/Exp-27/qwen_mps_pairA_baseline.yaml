# ═══════════════════════════════════════════════════════════════════════════
# EXP-27 — Cone-Alpha-Sweep + StyleGAN-Qwen-Fill
# Pair A: hammerhead shark ↔ spotted salamander (Exp-26-seed_83-LLaVA anchor)
# Cell:   VQGAN baseline (cone_filter disabled) — anchor point
# ═══════════════════════════════════════════════════════════════════════════
#
# Roster-locked pair-A reproduces Exp-26-seed_83 on Qwen-MPS to enable
# cross-SUT comparison (LLaVA-OV-baseline saw 0 flips, floor 1.3801).
#
# Pair-A is the "hard" pair from Exp-24/Exp-25 anchor history.
# Pair-B (junco↔chickadee) is in sibling configs.
#
# Output: runs/Exp-27/exp27_qwen_mps_pairA_baseline_seed_<i>_<ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp27_qwen_mps_pairA_baseline
save_dir: runs/Exp-27

modality: image_only

generations: 100
pop_size: 20

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B
  backend: torch

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  mode: roster
  filter_indices: [0]
  roster:
    class_list:
      - hammerhead shark
      - spotted salamander
    seeds_per_class: 1
    min_anchor_confidence: 4.5      # calibrated for salamander gt_logprob ≈ -4.2
    abstraction:
      levels_anchor: [-1]
      levels_target: [-1]
      apply_disjointness: true
      directions: forward

image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz
  cone_filter:
    enabled: false                  # ← baseline anchor; cone disabled

optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}
      - {p_active: 0.030, fraction: 0.20}
      - {p_active: 0.100, fraction: 0.25}
      - {p_active: 0.300, fraction: 0.20}
      - {p_active: 0.500, fraction: 0.10}
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
