# ═══════════════════════════════════════════════════════════════════════════
# EXP-27 — StyleGAN-Qwen-Fill, Pair B (junco↔chickadee)
# ═══════════════════════════════════════════════════════════════════════════

name: exp27_qwen_mps_pairB_stylegan
save_dir: runs/Exp-27

modality: image_only

generations: 100
pop_size: 20

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B
  backend: torch

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  mode: roster
  filter_indices: [0]
  roster:
    class_list:
      - junco
      - chickadee
    seeds_per_class: 1
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [-1]
      levels_target: [-1]
      apply_disjointness: true
      directions: forward

image:
  backend: stylegan_xl
  stylegan:
    checkpoint_url: https://s3.eu-central-1.amazonaws.com/avg-projects/stylegan_xl/models/imagenet256.pkl
    checkpoint_path: ~/.cache/stylegan_xl/imagenet256.pkl
    interpolate: true
    truncation_psi: 1.0
    truncation_cutoff: 0
    kappa_quant_levels: 20
    target_m: 10
    sut_precheck_max_attempts: 200

optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.07, fraction: 0.20}
      - {p_active: 0.21, fraction: 0.20}
      - {p_active: 0.43, fraction: 0.25}
      - {p_active: 0.64, fraction: 0.20}
      - {p_active: 1.00, fraction: 0.10}
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
