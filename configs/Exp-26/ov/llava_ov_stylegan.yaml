# ═══════════════════════════════════════════════════════════════════════════
# EXP-26 — Targeted-Search 3-Way Comparison: StyleGAN-XL w-Space Interpolation
# ═══════════════════════════════════════════════════════════════════════════
#
# StyleGAN-XL ImageNet 256×256 backend. Per-layer κ ∈ [0,1] interpolates
# between the SUT-accepted synthetic origin w (sampled class-conditional from
# get_w(seed_int, origin_class)) and the class-modal target w (mean of m
# class-conditional samples). Genome = num_ws integer genes ∈ [0, Q]; κ = gene/Q.
#
# Origin handling: option (A) — synthetic class-conditional. Real ImageNet
# seed image is NOT inverted; the optimizer's "origin" is a generated image
# of the origin class, accepted only after the same LLaVA SUT classifies it
# in the origin class. This decouples origin identity from any specific
# ImageNet validation image, but stays comparable across backends because
# the target_class label is held constant and the SUT is identical.
#
# Sampling tiers are rebalanced for the ~14-layer genome dim — the VQGAN
# default tiers ({0.005, 0.030, …}) collapse to zero-active under such a
# small gene count. StyleGAN-side defaults below target activation counts
# 1 / 3 / 6 / 9 / num_ws across the same 5-tier mixture mass.
#
# Output: runs/Exp-26/exp26_llava_ov_stylegan_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp26_llava_ov_stylegan
save_dir: runs/Exp-26

modality: image_only

generations: 100
pop_size: 20

device: cpu

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [1, 2, 83]
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  backend: stylegan_xl
  stylegan:
    checkpoint_url: https://s3.eu-central-1.amazonaws.com/avg-projects/stylegan_xl/models/imagenet256.pkl
    checkpoint_path: ~/.cache/stylegan_xl/imagenet256.pkl
    interpolate: true
    truncation_psi: 1.0
    truncation_cutoff: 0
    kappa_quant_levels: 20
    target_m: 10
    sut_precheck_max_attempts: 200

optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    # Tiers calibrated for ~14-layer StyleGAN-XL @ 256 genome dim.
    # Each tier's p_active picks E[n_active] ∈ {≈1, ≈3, ≈6, ≈9, ≈14}.
    # Re-tune if generator yields a different num_ws.
    tiers:
      - {p_active: 0.07, fraction: 0.20}     # spike      E[n_active] ≈ 1
      - {p_active: 0.21, fraction: 0.20}     # sparse     E[n_active] ≈ 3
      - {p_active: 0.43, fraction: 0.25}     # medium     E[n_active] ≈ 6
      - {p_active: 0.64, fraction: 0.20}     # heavy      E[n_active] ≈ 9
      - {p_active: 1.00, fraction: 0.10}     # full       E[n_active] = num_ws
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
