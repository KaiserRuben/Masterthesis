# VLM Boundary Test — Experiment Configuration
#
# Maps 1:1 to ExperimentConfig in src/config.py.
# Only uncomment values you want to override — everything else uses
# the dataclass defaults.
#
# Usage:
#   python experiments/runners/run_boundary_test.py configs/boundary_test.yaml
#   python experiments/runners/run_boundary_test.py configs/boundary_test.yaml --device cuda

# ===========================================================================
# Shared
# ===========================================================================

device: mps                             # cpu | cuda | mps

# categories:                           # Labels the VLM chooses from
#   - macaw
#   - peacock
#   - flamingo
#   - monarch butterfly
#   - jellyfish
#   - chameleon
#   - toucan
#   - leopard
#   - red panda
#   - lionfish
#   - coral reef
#   - volcano
#   - castle
#   - mosque
#   - palace
# n_categories: 50                      # Use first N ImageNet labels (ignores categories list)

# prompt_template: "What is the main subject in this image?"
# answer_format: " Answer with exactly one of these options: {categories}."

# ===========================================================================
# Experiment
# ===========================================================================

# name: vlm_boundary                    # Used in result directory names
save_dir: runs                          # Root directory for results
# generations: 100                      # Optimizer generations per seed
# pop_size: 50                          # Population size

# ===========================================================================
# Cache (ImageNet images)
# ===========================================================================
# First entry is primary (writable), rest are read-only fallbacks.
# Omit entirely → auto-creates .cache/imagenet in working directory.

cache_dirs:
  - ~/.cache/imagenet                   # local (primary)
  - /Volumes/SanDisk/Cache/imagenet     # external drive (skipped when not mounted)

# ===========================================================================
# SUT (Vision-Language Model)
# ===========================================================================

# sut:
#   model_id: Qwen/Qwen3.5-9B          # HuggingFace model identifier
#   enable_thinking: false              # Allow model thinking trace
#   max_thinking_tokens: 2000           # Token budget for thinking
#   max_pixels: null                    # Pixel cap (null = scorer default)

# ===========================================================================
# Image manipulator (VQGAN codebook swaps)
# ===========================================================================

# image:
#   preset: f8-16384                    # f16-1024 | f16-16384 | f8-16384
#   patch_ratio: 0.1                    # Fraction of patches eligible
#   patch_strategy: FREQUENCY           # FREQUENCY | ALL
#   n_candidates: 25                    # Replacement candidates per patch
#   candidate_strategy: KNN             # KNN | UNIFORM | KFN
#   resolution: 256                     # VQGAN input resolution
#   knn_cache_path: null                # Path to codebook KNN cache (null = recompute)

# ===========================================================================
# Text manipulator (PoS-aware synonym replacement)
# ===========================================================================

# text:
#   spacy_model: en_core_web_sm         # spaCy model for PoS tagging
#   embedding_model: fasttext-wiki-news-subwords-300  # gensim embedding model
#   n_candidates: 25                    # Synonym candidates per word

# ===========================================================================
# Seed generation
# ===========================================================================

# seeds:
#   n_per_class: 5                      # ImageNet images to sample per category
#   max_logprob_gap: 2.0                   # Max log-prob gap (smaller = closer to boundary)

# ===========================================================================
# Optimizer (method + init-population sampling + early stopping)
# ===========================================================================
#
# The block below is ACTIVE (not commented) and encodes the Phase-1
# validated defaults — sparse init plus OR-composed early-stop triggers.
# To revert to legacy behaviour (uniform random init, hard-cap-only stop),
# set `sampling.mode: uniform` and `early_stop.enable: false`.

optimizer:
  method: M0                            # M0 = baseline AGE-MOEA-2. M1..M4 are run_screening.py-only.

  # -- Init sampling. Phase-1 validated defaults (Exp-10, 2026-04-20):
  #    sparse init gives 134×-252× higher 2D HV on (n_active, TgtBal)
  #    vs. uniform random across 4 pairs. `mode: uniform` reverts to
  #    PyMoo's IntegerRandomSampling (historical baseline, no sparsity
  #    prior — reaches dense-only Pareto fronts).
  sampling:
    mode: sparse                        # sparse | uniform
    p_active: 0.03                      # Bernoulli prob an image gene is active per ind. E[n_active] = image_dim * p_active.
    geometric_rate: 0.5                 # Rate of truncated geometric depth for active genes. Higher -> shallower depths.
    zero_anchor_fraction: 0.05          # Fraction of pop with all-zero image block (identity anchor).
    uniform_fallback_fraction: 0.10     # Fraction with Bernoulli mask × uniform depth. Diversity insurance.

  # -- Early stopping. OR-composed triggers: flip (TgtBal <= dtype-tied
  #    epsilon) | plateau (no HV gain for `plateau_patience` gens, needs
  #    `hypervolume_reference`) | no_improvement (min TgtBal never beat
  #    gen-0 after warmup) | hard_cap (generations cap). Saves ~30-50%
  #    wall time on saturated runs (e.g. shark Phase-1 converged by
  #    gen 100, used to run to 199).
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30             # Flip threshold = np.finfo(dtype).tiny + margin.
    plateau_patience: 30                # Gens of no HV improvement before plateau fires.
    no_improvement_warmup: 20           # Gens before no-improvement trigger can fire.
    hypervolume_reference: null         # e.g. [0.5, 1.0, 5.0] for (MatDist, TextDist, TgtBal). null disables plateau trigger only.
