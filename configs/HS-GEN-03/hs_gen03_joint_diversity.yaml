# ═══════════════════════════════════════════════════════════════════════════
# HS-GEN-03 — Fresh joint-diversity generation pool for the HS-01 human study
# ═══════════════════════════════════════════════════════════════════════════
# Diary: [[HS-01-Human-Study]] (joint-modality strata) — generation campaign.
# Base : configs/HS-GEN-02/hs_gen02_joint_diversity.yaml — IDENTICAL pipeline
#        (joint modality, LLaVA-OV-INT8, VQGAN cone alpha=20, full_stack text,
#        sparse_multitier init, 30 gen x 30 pop, early_stop disabled). ONLY the
#        roster class_list + filter_indices change.
# Run  : conda run -n uni python experiments/runners/run_boundary_test.py \
#            configs/HS-GEN-03/hs_gen03_joint_diversity.yaml
#        (one invocation runs ALL filter_indices; no per-pair chaining needed.)
#
# ─── WHY THIS CONFIG ────────────────────────────────────────────────────────
# The HS-01 frozen pool is 80/110 items, photo-disjoint. The ~30-item gap is
# dominated by the JOINT-type strata (pair balanced/text_heavy/image_heavy = −21,
# image/boundary_joint = −6). HS-GEN-02 supplied joint items but EXHAUSTED its
# 6-class roster (junco, ostrich, green iguana, boa constrictor, cello, marimba)
# at seeds_per_class=12 (the hard ceiling: 12*4 oversample <= 50 val imgs/class),
# yielding 27 crossers — all consumed, 0 spare. HS-GEN-03 therefore introduces a
# NEW, DISJOINT 6-class roster (none of the existing 6) to produce FRESH distinct
# crossable anchor photos under the same pipeline.
#
# ─── NEW ROSTER (3 within-L2 buckets, anchor first) ─────────────────────────
# Mirrors HS-GEN-02's structure (bird / reptile / instrument) with brand-new,
# common, visually-unmistakable classes grouped into three within-L2 buckets:
#     bird     : peacock          -> flamingo
#     mammal   : zebra            -> Golden Retriever
#     vehicle  : school bus       -> airliner
# All three pairs share an L2 super-category (so they are the "within-bucket"
# high-yield family) yet are trivially lay-distinguishable (iridescent fanned
# peacock vs pink long-legged flamingo; striped zebra vs golden dog; yellow
# school bus vs jet airliner). Cross-bucket forward pairs span different L2
# super-categories (bird/mammal/vehicle) and are likewise trivially distinct —
# so EVERY (anchor, target) stimulus this campaign can promote is clearly
# tellable apart by a layperson.
#
# ─── CELL DESIGN (high-yield, max-photo) ────────────────────────────────────
# Identical to HS-GEN-02: select FORWARD (anchor earlier in class_list), level
# (la,lt)=(0,0) cells only, with TARGETS_PER_PHOTO=2 rotation so runs ≈ 2 x
# distinct photos while spanning many label-pairs. Empirical justification
# (46-run Exp-101 scan, configs/HS-GEN-02/_analyze_exp101_yield.py):
#     within-bucket forward (0,0): crossed 4/5  (80%)   <- highest yield
#     cross-bucket  forward (0,0): crossed 2/6  (33%)
#     forward >> reverse everywhere. The lt=1 walls and (1,0) cells do not cross
# under budget, so they are excluded.
#
#   filter_indices below were generated by
#   configs/HS-GEN-03/make_filter_indices.py against seeds_per_class=12 and the
#   (0,1,2)x(0,1,2) directions=both grid. Re-run + re-paste if class_list order,
#   seeds_per_class, or the cell design change. The enumeration shape is
#   class-content-independent (depends only on class COUNT/levels/directions/
#   seeds_per_class), so the index set matches HS-GEN-02 verbatim. Indices
#   reference the FULL enumeration (seeds_per_class=12 -> 2880 SeedTriples);
#   108 are selected.
#   Coverage: 108 runs, 60 DISTINCT anchor photos across 5 anchor classes
#   (peacock, flamingo, zebra, Golden Retriever, school bus), 15 label-pairs.
#
# ─── SEEDS_PER_CLASS CEILING ────────────────────────────────────────────────
# RosterSeedGenerator over-fetches seeds_per_class * 4 candidates/class
# (_OVERSAMPLE_FACTOR). ImageNet-1k validation has exactly 50 images/class, so
# seeds_per_class * 4 <= 50 -> seeds_per_class <= 12 is the hard no-rejection
# ceiling. 12 is therefore an UPPER bound; realistic rejection (misclass +
# below-threshold) may force a lower count for tight classes. fedora must
# confirm fill before launch (see LAUNCH). If a class cannot fill 12, lower
# seeds_per_class in BOTH this file and make_filter_indices.py, regenerate, and
# re-paste filter_indices.
#
# ─── ANCHORABILITY PREFLIGHT (LLaVA-OV-INT8, n=20/class) ────────────────────
# probe_class.py against this config (roster = the 6 classes), threshold 3.5:
#   peacock           20/20 (100%)  gt_logprob CORRECT median ~ -0.00x
#   flamingo          20/20 (100%)  gt_logprob CORRECT median ~ -0.00x
#   zebra             20/20 (100%)  gt_logprob CORRECT median ~ -0.00x
#   Golden Retriever  20/20 (100%)  gt_logprob CORRECT median ~ -0.0xx
#   school bus        20/20 (100%)  gt_logprob CORRECT median ~ -0.00x
#   airliner          20/20 (100%)  gt_logprob CORRECT median ~ -0.00x
# All 6 SAFE at threshold 3.5 (see configs/HS-GEN-03 report). Threshold 3.5
# carried over from HS-GEN-02 / Exp-100/101 (LLaVA-OV-INT8 preflight-validated).
#
# ─── WALL-TIME (fedora, LLaVA-OV-INT8, 2 workers) ───────────────────────────
# HS-GEN-02 / Exp-101 cost model: ~22.9 min wall / seed at the joint+cone setup
# with 2 workers. 108 runs x ~22.9 min = ~41 h (at 30 gen, slightly less than
# the 50-gen Exp-101 measurement). Plus one-time roster preflight (6 classes) +
# model load + cone modal-target precompute (target classes: flamingo, zebra,
# Golden Retriever, school bus, airliner; target_m=10, redis-cached) ~0.5-0.8 h.
# Confirm the real estimate with `--preflight` (see LAUNCH). EXCEEDS a single
# 24 h budget — plan a 2-day run or split filter_indices across two sessions
# (roster-mode resume IS supported, unlike the gap_filter HS-GEN-01 chain).
#
# ─── LAUNCH ─────────────────────────────────────────────────────────────────
#   # dry cost + roster-fill check first (does NOT abort; Ctrl-C if bad):
#   conda run -n uni python experiments/runners/run_boundary_test.py \
#       configs/HS-GEN-03/hs_gen03_joint_diversity.yaml --preflight
#   # full run (one invocation = all 108 cells):
#   conda run -n uni python experiments/runners/run_boundary_test.py \
#       configs/HS-GEN-03/hs_gen03_joint_diversity.yaml
#   # resume after interruption (roster-mode resume is supported):
#   conda run -n uni python experiments/runners/run_boundary_test.py \
#       configs/HS-GEN-03/hs_gen03_joint_diversity.yaml --resume --clean-partials
# ═══════════════════════════════════════════════════════════════════════════

name: hs_gen03_joint_diversity
save_dir: runs/HS-GEN-03

device: cpu

# 6-class roster — fresh + DISJOINT from HS-GEN-02. Pair-only scoring
# (score_full_categories left at its default False). Three within-L2 buckets,
# anchor first (order is load-bearing for the enumeration index space).
categories:
  - peacock
  - flamingo
  - zebra
  - Golden Retriever
  - school bus
  - airliner

# Joint modality (image + text genome blocks, 3-objective Pareto) — matches the
# HS-GEN-02 / Exp-101 pipeline that generated the existing joint corpus.
modality: joint

# ───────────────────────────────────────────────────────────────────────────
# SUT — LLaVA-OV-INT8 on fedora Arc A770 (identical to HS-GEN-02)
# ───────────────────────────────────────────────────────────────────────────
sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

# ───────────────────────────────────────────────────────────────────────────
# Budget — short uniform 30-gen run (identical to HS-GEN-02). early_stop off.
# ───────────────────────────────────────────────────────────────────────────
generations: 30
pop_size: 30

# ───────────────────────────────────────────────────────────────────────────
# Roster — 6 classes, seeds_per_class at the oversample ceiling (12). Class-
# list ORDER is load-bearing (forward/reverse direction semantics AND the
# enumeration index space) — do NOT reorder without regenerating filter_indices
# via make_filter_indices.py.
# ───────────────────────────────────────────────────────────────────────────
seeds:
  mode: roster
  # 108 forward (0,0) cells -> 60 distinct anchor photos across 5 anchor
  # classes. Generated by configs/HS-GEN-03/make_filter_indices.py against
  # seeds_per_class=12 + the (0,1,2)x(0,1,2) directions=both grid below.
  filter_indices: [0, 2, 5, 7, 10, 48, 51, 53, 56, 58,
                   157, 159, 162, 164, 167, 265, 268, 270, 273, 275,
                   374, 376, 379, 381, 528, 530, 532, 534, 536, 538,
                   636, 638, 640, 642, 644, 646, 745, 747, 749, 751,
                   753, 755, 853, 855, 857, 859, 861, 863, 1176, 1177,
                   1179, 1180, 1182, 1183, 1185, 1186, 1224, 1226, 1227, 1229,
                   1230, 1232, 1233, 1235, 1333, 1334, 1336, 1337, 1339, 1340,
                   1342, 1343, 1704, 1705, 1706, 1707, 1708, 1709, 1710, 1711,
                   1712, 1713, 1714, 1715, 1812, 1813, 1814, 1815, 1816, 1817,
                   1818, 1819, 1820, 1821, 1822, 1823, 2352, 2353, 2354, 2355,
                   2356, 2357, 2358, 2359, 2360, 2361, 2362, 2363]
  roster:
    class_list:
      - peacock
      - flamingo
      - zebra
      - Golden Retriever
      - school bus
      - airliner
    # 12 = hard oversample ceiling (12*4=48 <= 50 val pool). If any class fails
    # to fill 12 anchors, RosterSeedGenerator fails fast — lower this value in
    # BOTH this file and make_filter_indices.py, regenerate filter_indices, and
    # re-paste. Threshold 3.5 carried over from HS-GEN-02 / Exp-100/101
    # (LLaVA-OV-INT8 preflight-validated roster); all 6 new classes anchor 20/20.
    seeds_per_class: 12
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [0, 1, 2]
      levels_target: [0, 1, 2]
      apply_disjointness: true
      directions: both

# ───────────────────────────────────────────────────────────────────────────
# Image manipulator — VQGAN cone backend (identical to HS-GEN-02)
# ───────────────────────────────────────────────────────────────────────────
image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz
  cone_filter:
    enabled: true
    alpha_deg: 20.0
    target_m: 10

text:
  composite:
    profile: full_stack

parallel:
  workers: 2                              # OV-GPU + torch/CPU split -> true concurrency

# ═══════════════════════════════════════════════════════════════════════════
# Optimizer — EXACT sparse_multitier block from HS-GEN-02 / Exp-100/101 (the
# gen-0 init population). early_stop DISABLED -> every seed runs the identical
# 30-gen length (matches the joint corpus the HS-01 pool draws from).
# ═══════════════════════════════════════════════════════════════════════════
optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}   # spike       E[n_active] ≈ 1
      - {p_active: 0.030, fraction: 0.20}   # sparse      E[n_active] ≈ 7
      - {p_active: 0.100, fraction: 0.25}   # medium      E[n_active] ≈ 22
      - {p_active: 0.300, fraction: 0.20}   # heavy       E[n_active] ≈ 67
      - {p_active: 0.500, fraction: 0.10}   # very heavy  E[n_active] ≈ 111
  early_stop:
    enable: false                           # uniform 30-gen length
