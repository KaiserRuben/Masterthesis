# ═══════════════════════════════════════════════════════════════════════════
# EXP-12 A/B — text objective swap — arm A (legacy fasttext word-sum)
# ═══════════════════════════════════════════════════════════════════════════
#
# Purpose: measure whether swapping TextReplacementDistance (sum of per-word
# fasttext cosine distances) for TextEmbeddingDistance (sentence-level cosine
# in the SUT's own embedding space) changes search behaviour under otherwise
# identical conditions.
#
# Reference: Exp-10 phase1_junco_chickadee_n16383 (same pair, same seed filter,
# same sparse init). Budget reduced from Exp-10 (200 → 100 gens) since the
# question is objective sensitivity, not final reachability.
#
# Arm A pins the legacy word-level objective. Arm B (ab_B_embedding.yaml)
# pins the new sentence-embedding objective; everything else matches.
# ═══════════════════════════════════════════════════════════════════════════

name: exp12_ab_A_fasttext_junco_chickadee
save_dir: runs/Exp-12

text_objective: fasttext

generations: 100
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  n_per_class: 3
  max_logprob_gap: 3.5
  filter_indices: [83]  # junco→chickadee — matches Exp-10 / Exp-09 run 4

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

optimizer:
  sampling:
    mode: sparse
    p_active: 0.03
    geometric_rate: 0.5
    zero_anchor_fraction: 0.05
    uniform_fallback_fraction: 0.10
