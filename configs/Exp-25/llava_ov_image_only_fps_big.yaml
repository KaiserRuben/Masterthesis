# ═══════════════════════════════════════════════════════════════════════════
# EXP-25 — Diversity-FPS Init A/B vs Exp-24 image-only baseline (LLaVA OV)
# ═══════════════════════════════════════════════════════════════════════════
#
# Sole intervention vs configs/Exp-24/llava_ov_image_only.yaml:
#   sampling.mode: sparse_multitier  ➜  sparse_multitier_fps
#
# All other knobs identical (same SUT, pair, seeds, modality, generations,
# tiers, early-stop). Direct A/B against Exp-24 image_only floor 1.4907.
#
# H25-1: Exp-25 LLaVA image_only floor < Exp-24 LLaVA image_only floor
#        → search-budget-via-init-coverage limits the joint Exp-24 result.
# H25-1 FALSE: Exp-24 floor was operator-strength-limited, not search-init.
#
# Output: runs/Exp-25/exp25_llava_ov_image_only_fps_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp25_llava_ov_image_only_fps
save_dir: runs/Exp-25

modality: image_only

generations: 300
pop_size: 50

device: cpu

sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [1,25,83]
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz

# text section omitted — modality=image_only forces profile=noop at runtime.

optimizer:
  sampling:
    mode: sparse_multitier_fps          # ← only delta vs Exp-24 baseline
    zero_anchor_fraction: 0.05
    fps_subset_size: 512                # lazy-FPS subset cap per pick
    fps_metric: cosine                  # matches existing KNN-build distance
    tiers:
      - {p_active: 0.005, fraction: 0.20}
      - {p_active: 0.030, fraction: 0.20}
      - {p_active: 0.100, fraction: 0.25}
      - {p_active: 0.300, fraction: 0.20}
      - {p_active: 0.500, fraction: 0.10}
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null

# Parallel-seed dispatch. OV split: VQGAN runs on torch CPU (lock key
# "cpu"), SUT runs on Arc GPU (lock key "ov:GPU"). Distinct lock keys =
# true parallel — worker B's VQGAN decode overlaps worker A's SUT loop.
parallel:
  workers: 2
