# ═══════════════════════════════════════════════════════════════════════════
# EXP-103 — Coordinate Boundary Testing (VLM grounding)
# Maps to ExperimentConfig + the coordinate extension.
# Spec : docs/superpowers/specs/2026-06-22-coordinate-boundary-testing-design.md
# Diary: [[Exp-103-Koordinaten-Boundary-Grounding]]
# Boundary objective = |lp(box_A) − lp(box_B)|, teacher-forced (coordinate TargetedBalance).
#
# STATUS: DRAFT — requires the coordinate extension (grounding modality + refcocoplus
#         seed adapter); will not run until those land. Keys marked [NEW] are the
#         additions; all others are existing schema (values mirror Exp-101q).
# ═══════════════════════════════════════════════════════════════════════════

name: exp103_coordinate_grounding_refcocoplus
save_dir: runs/Exp-103
device: mps

# ── SUT — same model as Exp-101q (cached, grounding-confirmed) ──
sut:
  model_id: Qwen/Qwen3.5-4B
  backend: torch
  enable_thinking: false          # suppress <think> → clean teacher-forced scoring

# ── Output modality / boundary type ──
modality: grounding               # [NEW] image(+text) in, coordinate out
grounding:                        # [NEW] coordinate-output block
  coordinate_space: norm_1000     # [NEW] norm_1000 (Qwen3-VL/3.5, verified) |
                                  #       abs_pixels (Qwen2.5-VL → rescale via image_grid_thw)
  bbox_format: json_bbox_2d       # [NEW] {"bbox_2d":[x1,y1,x2,y2]}
  answer_format: " Report the bounding box as a JSON array [x1, y1, x2, y2]."   # new value, existing mechanism

# NOTE: no global `categories:` in grounding mode — the two candidates are the
# per-item box strings (box_A, box_B), supplied by the seed adapter below.

cache_dirs:
  - ~/.cache/imagenet

generations: 50
pop_size: 30

# ── Seeds — RefCOCO+ two-referent items ──
seeds:
  mode: refcocoplus               # [NEW] dataset seed adapter
  refcocoplus:                    # [NEW]
    data_root: ~/.cache/refcoco   # COCO images + refcoco+ annotations
    split: testA                  # testA = multi-person scenes (same-category ambiguity)
    ambiguity:                    # keep items with two same-category referents
      same_category: true
      n_referents: 2
    n_items: 40
    # each item → (image, referring_prompt, box_A_str, box_B_str)
  gen0_screen:                    # [NEW] reuses the Gen-0 margin predictor
    enable: true                  # only search items predicted crossable
    metric: median_gen0_tgtbal
    keep_below: null              # threshold recalibrated per-task (P4) after a screen pass

# ── Manipulation axis — reuse existing manipulators via the modality flag ──
# Perturb to flip the referent: image, text (expression), or both.
image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz
text:
  composite:
    profile: full_stack

parallel:
  workers: 1

# ── Optimizer — identical sparse_multitier block (the Gen-0 probe IS this π₀) ──
optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}
      - {p_active: 0.030, fraction: 0.20}
      - {p_active: 0.100, fraction: 0.25}
      - {p_active: 0.300, fraction: 0.20}
      - {p_active: 0.500, fraction: 0.10}
  early_stop:
    enable: true
    plateau_patience: 20
