# ═══════════════════════════════════════════════════════════════════════════
# EXP-09 M0 — Full-codebook candidate range (n_candidates = 16383)
# ═══════════════════════════════════════════════════════════════════════════
#
# Tests the dominant hypothesis: the artificial n_candidates=25 cap on the
# 16384-codeword f8-16384 VQ-GAN is the primary reason single-patch swaps
# can't produce large semantic change. Each patch gene can now reach ANY
# codeword in the codebook, sorted by cosine distance.
#
# KNN precompute already returns the full 16383-length sorted order — only
# the slice length changes vs. the baseline. knn_cache_path keeps the
# ~2.15 GB int64 array on disk so all 6 EXP-09 runs share it.
#
# Budget: 200 gen × 30 pop = 6000 SUT calls / seed (same as M0 baseline).
# ═══════════════════════════════════════════════════════════════════════════

name: exp09_M0_n16383
save_dir: runs/exp09

generations: 200
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  n_per_class: 3
  max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

optimizer:
  method: M0
  sampling:
    mode: uniform       # Explicit pin — this config was run under legacy IntegerRandomSampling; do not let new SamplingConfig default (sparse) silently change reproduction
