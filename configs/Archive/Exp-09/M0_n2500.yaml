# ═══════════════════════════════════════════════════════════════════════════
# EXP-09 M0 — Candidate sweep midpoint (n_candidates = 2500)
# ═══════════════════════════════════════════════════════════════════════════
#
# 100× the baseline cap. Tests whether the sweet spot is below full codebook
# and whether deep-but-not-exhaustive candidate ranges already unlock the
# sparse-deep Pareto corner.
#
# Only run on shark seed 5 for the sweep; generalization runs use n=16383.
# ═══════════════════════════════════════════════════════════════════════════

name: exp09_M0_n2500
save_dir: runs/Exp-09

generations: 200
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  n_per_class: 3
  max_logprob_gap: 3.5

image:
  n_candidates: 2500
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

optimizer:
  method: M0
  sampling:
    mode: uniform       # Explicit pin — this config was run under legacy IntegerRandomSampling; do not let new SamplingConfig default (sparse) silently change reproduction
