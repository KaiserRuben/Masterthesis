# ═══════════════════════════════════════════════════════════════════════════
# EXP-12 addendum — arm C (embedding objective + GloVe word-level manipulator)
# ═══════════════════════════════════════════════════════════════════════════
#
# Arms A and B of Exp-12 both surfaced the same failure: the lowest-TgtBal
# survivors were "non-X" negation prompts, because fasttext-wiki-news-subwords-300
# puts "non-main", "non-subject", "non-image" in the top-15 nearest neighbors
# of "main" / "subject" / "image" (subword overlap dominates cosine similarity).
# The text objective swap (A → B) couldn't evict them — the manipulator was
# handing them to the search as first-class candidates.
#
# Arm C tests whether swapping the candidate source to GloVe (word-level,
# 400k curated vocab, no subwords) eliminates the negation hack by omission:
# "non-main" is OOV in GloVe so it cannot be proposed. Top-15 of "main" in
# GloVe: key, major, primary, leading, principal, important, central — real
# paraphrases.
#
# Everything else matches arm B exactly (text_objective = embedding, same
# seed, same pair, same budget, same sparse init). Only the manipulator's
# embedding_model changes.
#
# Prerequisite: GloVe downloaded via `python -c "import gensim.downloader as
# api; api.load('glove-wiki-gigaword-300')"` (~394 MB, one-time).
# ═══════════════════════════════════════════════════════════════════════════

name: exp12_ab_C_embedding_glove_junco_chickadee
save_dir: runs/Exp-12

text_objective: embedding

generations: 100
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  n_per_class: 3
  max_logprob_gap: 3.5
  filter_indices: [83]  # junco→chickadee — matches Exp-10 / Exp-09 run 4 / Exp-12 arms A, B

text:
  embedding_model: glove-wiki-gigaword-300

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

optimizer:
  sampling:
    mode: sparse
    p_active: 0.03
    geometric_rate: 0.5
    zero_anchor_fraction: 0.05
    uniform_fallback_fraction: 0.10
