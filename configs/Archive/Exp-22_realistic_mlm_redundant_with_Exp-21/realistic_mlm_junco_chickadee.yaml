# ═══════════════════════════════════════════════════════════════════════════
# EXP-22 — Realistic-MLM Composite (junco↔chickadee)
# ═══════════════════════════════════════════════════════════════════════════
#
# Replaces the FastText-subword Synonym backend (Exp-21) with ModernBERT-large
# MLM-based candidate generation, gated by a fine-grained PoS filter
# (Penn-Treebank tag match), a same-lemma reject, and a morphological
# negation-prefix regex. Goal: kill the artefact pool ("non-main",
# "non-subject", "still-image") that powered Exp-21's min TgtBal of 1.667.
#
# Saliency dropped — Exp-21 per-operator decomposition showed it actively
# raises the floor by ~0.7 TgtBal (corrupted prompts reinforce visual prior
# rather than shifting it).
#
# Same pair / seed / image-side as Exp-12, Exp-20, Exp-21 for direct compare.
#
# Reference baselines:
#   - Exp-12 arm B (FastText, single Synonym):  min TgtBal = 2.087
#   - Exp-12 arm C (GloVe,    single Synonym):  min TgtBal = 2.710
#   - Exp-21 (FastText composite):              min TgtBal = 1.667 (artefact)
#
# Hypothesis: realistic-MLM Composite floors lies between GloVe arm C
# (2.71, no surface ops) and Exp-21 (1.667, artefact-aided). Estimate
# 1.9–2.3 — Frag + clean-pool MLM should beat GloVe-alone by 0.4–0.8
# but stay above Exp-21's contaminated floor.
#
# Output: runs/Exp-22/exp22_realistic_mlm_junco_chickadee_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp22_realistic_mlm_junco_chickadee
save_dir: runs/Exp-22

generations: 300
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [83]   # junco→chickadee
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

text:
  composite:
    profile: realistic_full

optimizer:
  sampling:
    mode: sparse
    p_active: 0.03
    geometric_rate: 0.5
    zero_anchor_fraction: 0.05
    uniform_fallback_fraction: 0.10
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50
    no_improvement_warmup: 30
    hypervolume_reference: null
