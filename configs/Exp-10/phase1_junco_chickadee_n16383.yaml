# ═══════════════════════════════════════════════════════════════════════════
# EXP-10 Phase 1 generalization — junco → chickadee @ n=16383
# ═══════════════════════════════════════════════════════════════════════════
#
# Pair type: unreachable in Exp-08 (M4 aborted after 1 gen, TgtBal floor ~2.7)
# and Exp-09 (n=16383 uniform reached min TgtBal 2.30, no flip). Tests whether
# sparse init makes this pair reachable, or confirms it's a semantic deadlock
# the VLM won't cross regardless of init.
#
# Direct comparison: exp09_M0_n16383_junco_chickadee (same seed, same pair,
# same budget, only sampling differs).
# ═══════════════════════════════════════════════════════════════════════════

name: exp10_phase1_junco_chickadee_n16383
save_dir: runs/exp10

generations: 200
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  n_per_class: 3
  max_logprob_gap: 3.5
  filter_indices: [83]  # junco→chickadee — same index as exp09 run 4

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

optimizer:
  sampling:
    mode: sparse
    p_active: 0.03
    geometric_rate: 0.5
    zero_anchor_fraction: 0.05
    uniform_fallback_fraction: 0.10
