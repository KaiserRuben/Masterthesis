# ═══════════════════════════════════════════════════════════════════════════
# HS-GEN-02 — Joint-diversity generation pool for the HS-01 human study
# ═══════════════════════════════════════════════════════════════════════════
# Diary: [[HS-01-Human-Study]] (joint-modality strata) — generation campaign.
# Base : configs/Exp-101/exp101_margin_predictor.yaml — IDENTICAL pipeline
#        (joint modality, LLaVA-OV-INT8, VQGAN cone alpha=20, full_stack text,
#        sparse_multitier init, 50 gen x 30 pop, early_stop disabled).
# Run  : conda run -n uni python experiments/runners/run_boundary_test.py \
#            configs/HS-GEN-02/hs_gen02_joint_diversity.yaml
#        (one invocation runs ALL filter_indices; no per-pair chaining needed.)
#
# ─── WHY THIS CONFIG ────────────────────────────────────────────────────────
# HS-01's joint-modality strata (text_heavy, balanced, text low/medium/high
# drift, boundary_joint) need MANY DISTINCT anchor PHOTOS. The existing joint
# corpus (Exp-100/101/102/101q) only exercised ~23 distinct anchor photos
# because seeds_per_class was 2 (Exp-100 used 3 junco photos). This config
# raises seeds_per_class to the practical ceiling and selects HIGH-YIELD cells
# so that distinct-anchor-photo count is maximised, not deep boundary floors.
#
# ─── CELL DESIGN (high-yield, max-photo) ────────────────────────────────────
# A distinct anchor PHOTO = (anchor_class_concrete, seed_idx_in_class). Each
# selected SeedTriple is one RUN exercising ONE photo. To maximise distinct
# photos we select, per photo, a rotated pair of forward (la,lt)=(0,0) target
# cells (TARGETS_PER_PHOTO=2 in make_filter_indices.py) instead of all
# partners — so runs ≈ 2 x distinct photos while spanning many label-pairs.
#
# Cell family = FORWARD (anchor class earlier in class_list), level (0,0).
# Empirical justification (46-run Exp-101 scan,
# configs/HS-GEN-02/_analyze_exp101_yield.py):
#     within-bucket forward (0,0): crossed 4/5  (80%)   <- highest yield
#     cross-bucket  forward (0,0): crossed 2/6  (33%)
#     forward >> reverse everywhere (within 67% vs 11%; cross 36% vs 27%).
# The lt=1 "snake"/songbird walls and the (1,0) songbird wall do NOT cross
# under budget, so they are excluded. The 3 within-bucket forward (0,0) pairs
# (junco->ostrich, green iguana->boa constrictor, cello->marimba) ARE included:
# they are the single highest-yield cells AND add cello as a 5th anchor class
# (marimba never anchors a forward pair).
#
#   filter_indices below were generated by
#   configs/HS-GEN-02/make_filter_indices.py against seeds_per_class=12 and the
#   (0,1,2)x(0,1,2) directions=both grid. Re-run + re-paste if class_list order,
#   seeds_per_class, or the cell design change. Indices reference the FULL
#   enumeration (seeds_per_class=12 -> 2880 SeedTriples); 108 are selected.
#   Coverage: 108 runs, 60 DISTINCT anchor photos across 5 anchor classes
#   (junco, ostrich, green iguana, boa constrictor, cello), 15 label-pairs.
#
# ─── SEEDS_PER_CLASS CEILING ────────────────────────────────────────────────
# RosterSeedGenerator over-fetches seeds_per_class * 4 candidates/class
# (_OVERSAMPLE_FACTOR). ImageNet-1k validation has exactly 50 images/class, so
# seeds_per_class * 4 <= 50 -> seeds_per_class <= 12 is the hard no-rejection
# ceiling; beyond it the loader streams past the val pool and a strict class
# risks RuntimeError pool-exhaustion. 12 is therefore an UPPER bound: realistic
# rejection (misclass + below-threshold) may force a lower count for tight
# classes. The workstation must confirm fill before launch (see LAUNCH). If a
# class cannot fill 12, lower seeds_per_class in BOTH this file and
# make_filter_indices.py, regenerate, and re-paste filter_indices.
#
# ─── WALL-TIME (workstation Arc A770, LLaVA-OV-INT8, 2 workers) ──────────────
# Exp-101 cost model: ~22.9 min wall / seed at 50-gen joint+cone with 2 workers
# (~45.7 min single-worker / 2). 108 runs x 22.9 min = ~41.2 h. Plus one-time
# roster preflight (6 classes) + model load + cone modal-target precompute
# (target classes: ostrich, green iguana, boa constrictor, cello, marimba;
# target_m=10, redis-cached) ~0.5-0.8 h. TOTAL ~42 h wall (~1.75 days).
# This EXCEEDS a single 24 h budget — plan for a 2-day run or split the
# filter_indices into two halves across two sessions (resume is roster-mode so
# --resume works here, unlike the gap_filter HS-GEN-01 chain).
#
# ─── LAUNCH ─────────────────────────────────────────────────────────────────
#   # dry cost + roster-fill check first (does NOT abort; Ctrl-C if bad):
#   conda run -n uni python experiments/runners/run_boundary_test.py \
#       configs/HS-GEN-02/hs_gen02_joint_diversity.yaml --preflight
#   # full run (one invocation = all 108 cells):
#   conda run -n uni python experiments/runners/run_boundary_test.py \
#       configs/HS-GEN-02/hs_gen02_joint_diversity.yaml
#   # resume after interruption (roster-mode resume is supported):
#   conda run -n uni python experiments/runners/run_boundary_test.py \
#       configs/HS-GEN-02/hs_gen02_joint_diversity.yaml --resume --clean-partials
# ═══════════════════════════════════════════════════════════════════════════

name: hs_gen02_joint_diversity
save_dir: runs/HS-GEN-02

device: cpu

# 6-class roster — identical to Exp-100/101. Pair-only scoring
# (score_full_categories left at its default False).
categories:
  - junco
  - ostrich
  - green iguana
  - boa constrictor
  - cello
  - marimba

# Joint modality (image + text genome blocks, 3-objective Pareto) — matches the
# Exp-101 pipeline that generated the existing joint corpus.
modality: joint

# ───────────────────────────────────────────────────────────────────────────
# SUT — LLaVA-OV-INT8 on workstation Arc A770 (identical to Exp-101)
# ───────────────────────────────────────────────────────────────────────────
sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

# ───────────────────────────────────────────────────────────────────────────
# Budget — short uniform 50-gen run (identical to Exp-101). early_stop disabled.
# ───────────────────────────────────────────────────────────────────────────
generations: 30
pop_size: 30

# ───────────────────────────────────────────────────────────────────────────
# Roster — 6 classes, seeds_per_class raised to 12 (oversample ceiling). Class-
# list ORDER is load-bearing (forward/reverse direction semantics AND the
# enumeration index space) — do NOT reorder without regenerating filter_indices
# via make_filter_indices.py.
# ───────────────────────────────────────────────────────────────────────────
seeds:
  mode: roster
  # 108 forward (0,0) cells -> 60 distinct anchor photos across 5 anchor
  # classes. Generated by configs/HS-GEN-02/make_filter_indices.py against
  # seeds_per_class=12 + the (0,1,2)x(0,1,2) directions=both grid below.
  filter_indices: [0, 2, 5, 7, 10, 48, 51, 53, 56, 58,
                   157, 159, 162, 164, 167, 265, 268, 270, 273, 275,
                   374, 376, 379, 381, 528, 530, 532, 534, 536, 538,
                   636, 638, 640, 642, 644, 646, 745, 747, 749, 751,
                   753, 755, 853, 855, 857, 859, 861, 863, 1176, 1177,
                   1179, 1180, 1182, 1183, 1185, 1186, 1224, 1226, 1227, 1229,
                   1230, 1232, 1233, 1235, 1333, 1334, 1336, 1337, 1339, 1340,
                   1342, 1343, 1704, 1705, 1706, 1707, 1708, 1709, 1710, 1711,
                   1712, 1713, 1714, 1715, 1812, 1813, 1814, 1815, 1816, 1817,
                   1818, 1819, 1820, 1821, 1822, 1823, 2352, 2353, 2354, 2355,
                   2356, 2357, 2358, 2359, 2360, 2361, 2362, 2363]
  roster:
    class_list:
      - junco
      - ostrich
      - green iguana
      - boa constrictor
      - cello
      - marimba
    # 12 = hard oversample ceiling (12*4=48 <= 50 val pool). If any class fails
    # to fill 12 anchors, RosterSeedGenerator fails fast — lower this value in
    # BOTH this file and make_filter_indices.py, regenerate filter_indices, and
    # re-paste. Threshold 3.5 carried over from Exp-100/101 (LLaVA-OV-INT8
    # preflight-validated roster).
    seeds_per_class: 12
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [0, 1, 2]
      levels_target: [0, 1, 2]
      apply_disjointness: true
      directions: both

# ───────────────────────────────────────────────────────────────────────────
# Image manipulator — VQGAN cone backend (identical to Exp-101)
# ───────────────────────────────────────────────────────────────────────────
image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz
  cone_filter:
    enabled: true
    alpha_deg: 20.0
    target_m: 10

text:
  composite:
    profile: full_stack

parallel:
  workers: 2                              # OV-GPU + torch/CPU split -> true concurrency

# ═══════════════════════════════════════════════════════════════════════════
# Optimizer — EXACT sparse_multitier block from Exp-100/101 (the gen-0 init
# population). early_stop DISABLED -> every seed runs the identical 50-gen
# length (matches the Exp-101 joint corpus the HS-01 pool draws from).
# ═══════════════════════════════════════════════════════════════════════════
optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}   # spike       E[n_active] ≈ 1
      - {p_active: 0.030, fraction: 0.20}   # sparse      E[n_active] ≈ 7
      - {p_active: 0.100, fraction: 0.25}   # medium      E[n_active] ≈ 22
      - {p_active: 0.300, fraction: 0.20}   # heavy       E[n_active] ≈ 67
      - {p_active: 0.500, fraction: 0.10}   # very heavy  E[n_active] ≈ 111
  early_stop:
    enable: false                           # uniform 50-gen length
