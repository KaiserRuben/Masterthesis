# ═══════════════════════════════════════════════════════════════════════════
# EXP-101 — Gen-0 Margin Predictor (wide-coverage, shallow-depth screen)
# ═══════════════════════════════════════════════════════════════════════════
# Diary: [[Exp-101-Margin-Predictor]]  (100-series = geometry series)
# Base : configs/Exp-100/poc_workstation_cone.yaml (SUT, cone-VQGAN, text,
#        sparse_multitier init) — EVOLUTIONARY-ONLY (no PDQ stage).
# Run  : python experiments/runners/run_boundary_test.py \
#            configs/Exp-101/exp101_margin_predictor.yaml
#        (optionally prepend `--preflight` to measure per-call cost first)
#
# ─── (a) HYPOTHESIS + PRE-REGISTERED PREDICTIONS ────────────────────────────
# Exp-100 partial analysis (119 junco-anchored seeds, LLaVA-OV-INT8) found a
# "gen-0 margin predictor": the MEDIAN TgtBal of the 30 random init
# individuals (generation 0) predicts evolutionary search outcome. Evidence:
# Spearman rho ~0.53 seed-level vs final best TgtBal; ALL 16 stuck seeds in
# the top tercile of gen-0 median margin; between-cell rho 0.70 vs within-cell
# rho 0.08 (n.s.) and init-luck rho -0.06 (n.s.) -> behaves like a property of
# (SUT x label-pair), not of the init draw. LIMITATION of that evidence:
# single anchor class (junco), forward direction only, one SUT.
#
# Exp-101 tests whether gen-0 median margin predicts CONVERGENCE SPEED under a
# fixed short budget ACROSS anchor classes, directions and label-pair cells —
# wide coverage, shallow depth. Outcome metrics are SPEED, not deep floors:
#   * dex_eroded@N  = log10( TgtBal_gen0 / min TgtBal by gen N )
#   * gen_first_cross = first generation with any individual p_class_b > p_class_a
#   * crossed@N      = bool (did any individual cross within the budget)
# Probe = median fitness_TgtBal over the 30 gen-0 individuals (per seed/cell).
#
#   P1  Between-cell rank correlation of gen-0 median margin vs dex_eroded@N is
#       STRONGLY NEGATIVE (high margin -> low erosion -> slow/stuck), and this
#       holds on the NON-junco anchor subset (31 of 40 cells here).
#   P2  Cells with gen-0 median margin above ~3 nats RARELY cross within budget.
#   P3  Within-cell residual correlation (gen-0 margin vs erosion, after
#       removing the cell mean) stays ~0 where n>=2 seeds — confirming the
#       signal is a (SUT x label-pair) property, not init luck.
#
#   FALSIFICATION: between-cell correlation collapses (|rho| < 0.3) on the
#   non-junco anchor subset -> the predictor was a junco/forward artifact.
#
# ─── (b) CELL-SUBSET DESIGN (why this subset) ───────────────────────────────
# Full enumeration of the 6-class roster (both directions, all valid
# abstraction cells) = 240 directed cells; at n=1 that alone is ~7x the 24 h
# budget. We sub-sample a STRATIFIED 40-cell subset, balanced over
# (anchor class x cell_kind x level-diagonal/off-diagonal), and upgrade 6 cells
# to n=2 so P3 (within-cell null) is testable. 40 cells + 6 extra rows = 46 runs.
#
#   Stratum 1 — within-bucket (c=2; same L2; valid cells require max(la,lt)<2):
#     cells {(0,0),(0,1),(1,1)} for BOTH directions of all 3 same-L2 pairs
#     (junco<->ostrich, iguana<->boa, cello<->marimba). Diagonal (0,0)/(1,1)
#     + one off-diagonal (0,1). 18 cells.
#   Stratum 2 — cross-bucket (c=None) REQUIRED junco label-wall replications,
#     their super-level controls, and their REVERSE directions (12 cells):
#       junco->boa  : target-level sweep @ la=0 -> (0,0),(0,1 "snake" WALL),(0,2 "reptile" ctrl)
#       boa->junco  : target-level sweep @ la=0 -> (0,0),(0,1 "songbird"),(0,2 "bird")
#       junco->cello: anchor-level sweep @ lt=0 -> (0,0),(1,0 "songbird" WALL),(2,0 "bird" ctrl)
#       cello->junco: target-level sweep @ la=0 -> (0,0),(0,1 "songbird"),(0,2 "bird")
#   Stratum 3 — cross-bucket breadth on NON-junco anchors (powers the P1
#     falsification test), diagonal cells, 10 cells:
#       ostrich->iguana, iguana->cello, marimba->boa, cello->ostrich, boa->marimba.
#
#   n=2 (within-cell null, P3): junco->ostrich (0,0), iguana->boa (1,1),
#     cello->marimba (0,0), junco->boa (0,1 "snake"), boa->junco (0,1),
#     iguana->cello (0,0) — span cell-kinds + stuck/converged regimes.
#
#   Coverage: all 6 classes appear as anchors; 31/40 cells are non-junco
#   anchored (well-powered falsification subset); 9/40 replicate the junco
#   anchor; 26 diagonal vs 14 off-diagonal; 18 within-bucket vs 22 cross-bucket.
#
#   filter_indices below were generated by configs/Exp-101/make_filter_indices.py
#   (re-runs the real combinatorial_pairs() enumeration with mock SeedImages so
#   the index list is provably aligned with the runner). Re-run + re-paste if
#   class_list order or the cell design ever changes. Indices reference the FULL
#   enumeration (seeds_per_class=2 -> 480 SeedTriples); 46 are selected. Original
#   indices are preserved in output dir names (e.g. seed_0028 = junco->boa "snake").
#
# ─── (c) GENERATION BUDGET + WALL-TIME MATH ─────────────────────────────────
# generations=50: chosen from Exp-100 convergence evidence. The median seed
# reached 90% of its LINEAR TgtBal improvement by gen 12 (IQR 6-32) and 90% of
# its LOG-scale improvement by gen 81 (IQR 43-136); last improvement median
# gen 111. For SPEED metrics (dex eroded by gen N, gen of first cross), gen 50
# sits above the linear-90% mark for nearly all seeds yet well below the
# log-90% mark — so it discriminates fast-vs-slow erosion cleanly without
# spending budget chasing deep floors. early_stop is DISABLED so every seed
# runs the IDENTICAL 50-gen length (uniform length is required for a clean
# convergence-speed comparison; note also the known bug that
# hypervolume_reference: null silently disables the plateau trigger anyway).
#
# Cost model (Exp-100, this exact workstation: LLaVA-OV-INT8 / Arc A770 /
# ov_device GPU / parallel.workers 2):
#   * evolutionary ~50 s/generation (measured; INCLUDES both workers running
#     concurrently) -> 50 gen x 50 s = 2500 s = 41.7 min / seed.
#   * finalize (Pareto PNG render) ~9 min @ 200 gen; scales with front size,
#     smaller for short runs -> est. ~4 min / seed @ 50 gen.
#   * per-seed total ~45.7 min; with 2 workers concurrent -> wall throughput
#     ~22.9 min / seed.
#   * 46 runs x 22.9 min = ~17.6 h.
#   * one-time: roster preflight (6 classes) + model load + cone modal-target
#     precompute (target_m=10, redis-cached) ~0.5-0.8 h.
#   * TOTAL ~18.1-18.4 h wall  ->  ~23 % headroom under the 24 h budget.
#
# ─── (d) LAUNCH ─────────────────────────────────────────────────────────────
#   python experiments/runners/run_boundary_test.py \
#       configs/Exp-101/exp101_margin_predictor.yaml
#   # dry cost check first (does NOT abort; Ctrl-C if projection unacceptable):
#   python experiments/runners/run_boundary_test.py \
#       configs/Exp-101/exp101_margin_predictor.yaml --preflight
#
# ─── (e) ANALYSIS PLAN (existing artifacts only) ────────────────────────────
# Per run dir runs/Exp-101/exp101_margin_predictor_seed_<i>_<ts>/:
#   * trace.parquet — gen-0 PROBE: rows where generation==0; predictor =
#     median(fitness_TgtBal) over the 30 individuals. CROSSING: first
#     generation with any row p_class_a < p_class_b (gen_first_cross /
#     crossed@N). stats.json carries the cell metadata (anchor/target_concrete,
#     level_anchor, level_target, seed_idx_in_class, common_ancestor_level) for
#     grouping into cells.
#   * convergence.parquet — EROSION: pop_min_TgtBal (and pareto_min_TgtBal) per
#     generation -> dex_eroded@N = log10(TgtBal@gen0 / min TgtBal by gen N).
# Stats: (P1) Spearman rho between cell-median gen-0 margin and cell-median
#   dex_eroded@N, computed on ALL cells and on the NON-junco subset; (P2)
#   crossed@N rate stratified by gen-0 margin tercile / the ~3-nat threshold;
#   (P3) partial/within-cell residual Spearman on the 6 n=2 cells.
# ═══════════════════════════════════════════════════════════════════════════

name: exp101_margin_predictor
save_dir: runs/Exp-101

device: cpu

# 6-class roster — identical to Exp-100. Pair-only scoring (score_full_categories
# left at its default False) keeps fitness semantics identical to the run that
# produced the gen-0 margin evidence.
categories:
  - junco
  - ostrich
  - green iguana
  - boa constrictor
  - cello
  - marimba

# Joint modality (image + text genome blocks, 3-objective Pareto) — matches the
# Exp-100 evolutionary stage that produced the gen-0 margin finding.
modality: joint

# ───────────────────────────────────────────────────────────────────────────
# SUT — LLaVA-OV-INT8 on workstation Arc A770 (identical to Exp-100)
# ───────────────────────────────────────────────────────────────────────────
sut:
  model_id: OpenVINO/llava-v1.6-mistral-7b-hf-int8-ov
  processor_id: llava-hf/llava-v1.6-mistral-7b-hf
  backend: openvino
  ov_device: GPU

cache_dirs:
  - /mnt/storage/huggingface/imagenet

# ───────────────────────────────────────────────────────────────────────────
# Budget — short uniform run for convergence-SPEED comparison
# ───────────────────────────────────────────────────────────────────────────
generations: 50
pop_size: 30

# ───────────────────────────────────────────────────────────────────────────
# Roster — 6 classes, 2 seeds/class. seeds_per_class=2 so the 6 designated
# n=2 cells (selected via filter_indices) have a within-cell pair for P3.
# filter_indices then narrows the 480-row enumeration to the 46 pre-registered
# rows. Class-list ORDER is load-bearing (determines forward/reverse direction
# semantics AND the enumeration index space) — do NOT reorder without
# regenerating filter_indices via make_filter_indices.py.
# ───────────────────────────────────────────────────────────────────────────
seeds:
  mode: roster
  # 46 rows across 40 stratified cells (6 cells upgraded to n=2). Generated by
  # configs/Exp-101/make_filter_indices.py against seeds_per_class=2 + the
  # full (0,1,2)x(0,1,2) directions=both grid below.
  filter_indices: [0, 1, 2, 6, 26, 28, 29, 30, 44, 50,
                   56, 80, 82, 86, 88, 96, 196, 198, 202, 203,
                   204, 205, 212, 240, 242, 243, 244, 276, 278, 282,
                   302, 310, 320, 322, 324, 338, 354, 392, 393, 394,
                   398, 454, 462, 472, 474, 478]
  roster:
    class_list:
      - junco
      - ostrich
      - green iguana
      - boa constrictor
      - cello
      - marimba
    seeds_per_class: 2
    # Carried over from Exp-100 (LLaVA-OV-INT8 preflight-validated roster). If
    # any class fails to fill 2 anchors, RosterSeedGenerator fails fast — run a
    # preflight to recalibrate rather than swapping classes (out of scope here).
    min_anchor_confidence: 3.5
    abstraction:
      levels_anchor: [0, 1, 2]
      levels_target: [0, 1, 2]
      apply_disjointness: true
      directions: both

# ───────────────────────────────────────────────────────────────────────────
# Image manipulator — VQGAN cone backend (Exp-26 default; identical to Exp-100)
# ───────────────────────────────────────────────────────────────────────────
image:
  backend: vqgan_codebook
  n_candidates: 16383
  knn_cache_path: /mnt/storage/huggingface/vqgan_knn/f8_16384_full.npz
  cone_filter:
    enabled: true
    alpha_deg: 20.0
    target_m: 10

text:
  composite:
    profile: full_stack

parallel:
  workers: 2                              # OV-GPU + torch/CPU split -> true concurrency

# ═══════════════════════════════════════════════════════════════════════════
# Optimizer — EXACT sparse_multitier block from Exp-100 (the gen-0 probe IS
# this init population; changing any tier breaks comparability with the Exp-100
# evidence). early_stop DISABLED -> every seed runs the identical 50-gen length.
# ═══════════════════════════════════════════════════════════════════════════
optimizer:
  sampling:
    mode: sparse_multitier
    zero_anchor_fraction: 0.05
    tiers:
      - {p_active: 0.005, fraction: 0.20}   # spike       E[n_active] ≈ 1
      - {p_active: 0.030, fraction: 0.20}   # sparse      E[n_active] ≈ 7
      - {p_active: 0.100, fraction: 0.25}   # medium      E[n_active] ≈ 22
      - {p_active: 0.300, fraction: 0.20}   # heavy       E[n_active] ≈ 67
      - {p_active: 0.500, fraction: 0.10}   # very heavy  E[n_active] ≈ 111
  early_stop:
    enable: false                           # uniform 50-gen length for clean
                                            # convergence-speed comparison
