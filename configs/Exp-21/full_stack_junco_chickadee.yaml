# ═══════════════════════════════════════════════════════════════════════════
# EXP-21 — Realistic-Full Composite (junco↔chickadee)
# ═══════════════════════════════════════════════════════════════════════════
#
# Follow-up to Exp-20. Activates all four composite operators at
# "what real user inputs actually look like" severities:
#
#   * saliency       S=0.40   (K_max=2)  — typos are common
#   * synonym        S=0.55   (K_max=3)  — moderate FastText pool
#   * fragmentation  S=0.20   (K_max=1)  — rare ASR-style boundary errors
#   * character_noise S=0.20  (K_max=1)  — rare copy-paste homoglyph artefacts
#
# Question being asked: under genuinely realistic perturbations only — no
# FastText artefact-tail tricks like Exp-12's "non-main / non-subject" —
# can the search still drive TgtBal toward the boundary, given a larger
# search space and more generations?
#
# Same pair, seed, image-side as Exp-12 / Exp-20 for direct comparability.
# Generation budget tripled (300 vs 100); plateau patience increased so
# the run isn't aborted prematurely on the larger search space.
#
# Reference baselines:
#   - runs/Exp-12/exp12_ab_B_embedding_junco_chickadee_seed_83_*  (Synonym K=25, artifact-rich)
#   - runs/Exp-20/exp20_composite_v1_junco_chickadee_seed_83_*    (Composite Syn=0.10 + Sal=0.25, conservative)
#
# Output: runs/Exp-21/exp21_full_stack_junco_chickadee_seed_83_<unix-ts>/
# ═══════════════════════════════════════════════════════════════════════════

name: exp21_full_stack_junco_chickadee
save_dir: runs/Exp-21

generations: 300
pop_size: 30

device: mps

sut:
  model_id: Qwen/Qwen3.5-4B

cache_dirs:
  - ~/.cache/imagenet
  - /Volumes/SanDisk/Cache/imagenet

n_categories: 50

seeds:
  mode: gap_filter
  filter_indices: [83]   # junco→chickadee — matches Exp-12 / Exp-20
  gap_filter:
    n_per_class: 3
    max_logprob_gap: 3.5

image:
  n_candidates: 16383
  knn_cache_path: ~/.cache/vqgan_knn/f8_16384_full.npz

# -- Composite text-manipulator: realistic-full profile (Exp-21) -----------
# Adds Fragmentation + Character Noise to the Synonym/Saliency mix,
# raises Synonym + Saliency severity to realistic levels.
text:
  composite:
    profile: full_stack

optimizer:
  sampling:
    mode: sparse
    p_active: 0.03
    geometric_rate: 0.5
    zero_anchor_fraction: 0.05
    uniform_fallback_fraction: 0.10
  early_stop:
    enable: true
    epsilon_margin: 1.0e-30
    plateau_patience: 50          # more patience for larger search space
    no_improvement_warmup: 30
    hypervolume_reference: null
